version: '3.8'
services:
  ollama:
    image: ollama/ollama
    entrypoint: /bin/sh -c "ollama serve & sleep 10 && ollama pull llama3.2 && tail -f /dev/null"
    volumes: 
      - ./ollama_data:/root/.ollama
    ports:
      - "11434:11434"
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - ollama
  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    
    