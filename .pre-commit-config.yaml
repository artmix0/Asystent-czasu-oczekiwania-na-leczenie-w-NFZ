repos:
  # 1. Porządkowanie importów
  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: ["--profile", "black"] # Kompatybilność z Blackiem

  # 2. Formatowanie kodu (standard rynkowy)
  - repo: https://github.com/psf/black
    rev: 23.3.0
    hooks:
      - id: black

  # 3. Sprawdzanie błędów logicznych i stylu
  - repo: https://github.com/pycqa/flake8
    rev: 6.0.0
    hooks:
      - id: flake8
        args: ["--max-line-length=88", "--extend-ignore=E203"]